<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quai Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-xl mx-auto space-y-4">
        <h1 class="text-blue-500 font-black italic">QUAI LIVE MONITOR</h1>
        
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Saldo Atual</p>
            <div id="balance" class="text-3xl font-black text-green-400 font-mono">Conectando...</div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Status da Rede</p>
            <div id="status" class="text-sm font-medium text-slate-400 italic font-mono">Sincronizando...</div>
        </div>
    </div>

    <script>
        const wallet = "0x00222c20869Df2140c1c173010A0d550dB11B7fB";

        async function getLiveDetails() {
            const balDiv = document.getElementById('balance');
            const statDiv = document.getElementById('status');

            try {
                // Tentativa via API Direta com bypass de cache
                const response = await fetch(`https://prime.quaiscan.io/api/v2/addresses/${wallet}?t=${Date.now()}`);
                const data = await response.json();

                if (data && data.coin_balance) {
                    const finalBal = (parseFloat(data.coin_balance) / 1e18).toLocaleString('pt-BR', {minimumFractionDigits: 4});
                    balDiv.innerText = finalBal + " QUAI";
                    statDiv.innerText = "Atualizado: " + new Date().toLocaleTimeString();
                }
            } catch (err) {
                balDiv.innerText = "Erro na Rede";
                statDiv.innerText = "Tentando reconectar...";
            }
        }

        setInterval(getLiveDetails, 15000); // Atualiza a cada 15 segundos
        getLiveDetails();
    </script>
</body>
</html>
